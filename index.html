<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Memory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="chatbox">
            <div class="chat-header">
                <h1>🤖 Chatbot Memory</h1>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <p>Xin chào! Tôi là chatbot có khả năng nhớ. Hãy nói cho tôi biết về bạn! 😊</p>
                </div>
            </div>
            
            <div class="chat-input-area">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Nhập tin nhắn..." 
                    autocomplete="off"
                >
                <button id="sendBtn">Gửi</button>
            </div>
            
            <div class="memory-info">
                <button id="memoryBtn">📝 Xem Memory</button>
                <button id="clearBtn">🗑️ Xóa Memory</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
